<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凤凰主题控制</title>
    <style>
        :root {
            --phoenix-red: #f43f5e;
            --phoenix-orange: #fb923c;
            --phoenix-gold: #fbbf24;
            --phoenix-bg-dark: #0f1419;
            --phoenix-bg-light: #1e293b;
            --phoenix-text: #e2e8f0;
            --phoenix-accent: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 300px;
            background: linear-gradient(135deg, var(--phoenix-bg-dark), var(--phoenix-bg-light));
            color: var(--phoenix-text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 32px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 18px;
            color: var(--phoenix-gold);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.8;
        }

        .toggle-section {
            background: rgba(15, 20, 25, 0.6);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        .toggle-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .toggle-text {
            font-weight: bold;
        }

        /* 开关样式 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: var(--phoenix-text);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, var(--phoenix-red), var(--phoenix-orange));
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .settings-section {
            background: rgba(15, 20, 25, 0.6);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .setting-label {
            font-size: 12px;
        }

        select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--phoenix-red);
            color: var(--phoenix-text);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
        }

        .status {
            font-size: 11px;
            opacity: 0.7;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🔥</div>
        <h1>凤凰主题</h1>
        <div class="subtitle">Fhoenix Theme Control</div>
    </div>

    <div class="toggle-section">
        <label class="toggle-label">
            <span class="toggle-text">启用主题</span>
            <div class="toggle-switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </div>
        </label>
    </div>

    <div class="settings-section" id="settingsSection">
        <div class="setting-item">
            <span class="setting-label">主题变体</span>
            <select id="themeVariant">
                <option value="phoenix">凤凰火焰</option>
                <option value="deep-space">深空凤凰</option>
                <option value="aurora">极光凤凰</option>
            </select>
        </div>
        
        <div class="setting-item">
            <span class="setting-label",>动画效果</span>
            <select id="animationLevel">
                <option value="full">完整动画</option>
                <option value="minimal">简约动画</option>
                <option value="none">无动画</option>
            </select>
        </div>
    </div>

    <div class="status" id="statusText">准备就绪</div>

    <script src="popup.js"></script>
</body>
</html>
