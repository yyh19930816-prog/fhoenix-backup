<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凤凰语音 - 即时反馈测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: #0a0a0a;
            color: #fff;
            border-radius: 24px;
            border: 3px solid #f43f5e;
            box-shadow: 0 0 60px rgba(244, 63, 94, 0.3);
        }
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(45deg, #f43f5e, #fb923c, #facc15);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }
        .status-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .status-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            border-left: 8px solid;
            transition: all 0.3s ease;
        }
        .status-box.permission {
            border-left-color: #3b82f6;
        }
        .status-box.recognition {
            border-left-color: #10b981;
        }
        .status-box.active {
            border-left-color: #facc15;
            background: rgba(250, 204, 21, 0.1);
        }
        .status-box.error {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        .status-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-detail {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 15px 0;
            min-height: 32px;
        }
        .status-icon {
            font-size: 1.8rem;
        }
        
        /* 主控制按钮 */
        .control-section {
            text-align: center;
            margin: 40px 0;
        }
        .main-button {
            background: linear-gradient(135deg, #f43f5e 0%, #fb923c 50%, #f59e0b 100%);
            border: none;
            color: white;
            padding: 28px 60px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 300px;
            position: relative;
            overflow: hidden;
        }
        .main-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(244, 63, 94, 0.4);
        }
        .main-button:active {
            transform: translateY(-2px);
        }
        .main-button.active {
            background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #84cc16 100%);
            animation: pulse 2s infinite, recordingGlow 1.5s infinite alternate;
        }
        .main-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            background: linear-gradient(135deg, #6b7280 0%, #9ca3af 50%, #d1d5db 100%);
        }
        
        /* 录音动画 */
        @keyframes pulse {
            0%, 100% { transform: translateY(-5px) scale(1); }
            50% { transform: translateY(-5px) scale(1.05); }
        }
        @keyframes recordingGlow {
            0% { box-shadow: 0 25px 50px rgba(16, 185, 129, 0.4); }
            100% { box-shadow: 0 25px 70px rgba(16, 185, 129, 0.7); }
        }
        .recording-wave {
            display: none;
            width: 100%;
            height: 60px;
            margin: 20px 0;
            position: relative;
        }
        .recording-wave.active {
            display: block;
        }
        .wave-bar {
            position: absolute;
            bottom: 0;
            width: 12px;
            background: #10b981;
            border-radius: 6px 6px 0 0;
            animation: wave 1.5s infinite ease-in-out;
        }
        @keyframes wave {
            0%, 100% { height: 10px; }
            25% { height: 40px; }
            50% { height: 20px; }
            75% { height: 60px; }
        }
        
        /* 识别结果区域 */
        .results-section {
            margin-top: 50px;
        }
        .results-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #facc15;
        }
        .results-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 2px solid rgba(244, 63, 94, 0.3);
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-item {
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 12px;
            animation: fadeIn 0.5s ease;
            position: relative;
        }
        .result-item.user {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            margin-left: 20%;
            border-left: 6px solid #3b82f6;
        }
        .result-item.system {
            background: rgba(107, 114, 128, 0.2);
            border: 1px solid rgba(107, 114, 128, 0.4);
            text-align: center;
            border-left: 6px solid #6b7280;
        }
        .result-item.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-left: 6px solid #ef4444;
        }
        .result-item.special {
            background: rgba(244, 63, 94, 0.2);
            border: 1px solid rgba(244, 63, 94, 0.4);
            border-left: 6px solid #f43f5e;
        }
        .result-sender {
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .result-text {
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .result-time {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        /* 调试信息 */
        .debug-section {
            margin-top: 40px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
        }
        .debug-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #a78bfa;
        }
        .debug-log {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            body {
                margin: 20px;
                padding: 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .main-button {
                padding: 24px 40px;
                font-size: 1.5rem;
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>凤凰语音 - 即时反馈测试</h1>
        <div class="subtitle">完全本地 - 无需服务器 - 你说什么就显示什么</div>
        
        <!-- 状态容器 -->
        <div class="status-container">
            <div class="status-box permission" id="permission-status">
                <div class="status-title">
                    <span class="status-icon">🔐</span>
                    <span>麦克风权限状态</span>
                </div>
                <div class="status-detail" id="permission-detail">检查中...</div>
                <div class="status-sub" id="permission-hint"></div>
            </div>
            
            <div class="status-box recognition" id="recognition-status">
                <div class="status-title">
                    <span class="status-icon">🎤</span>
                    <span>语音识别引擎</span>
                </div>
                <div class="status-detail" id="recognition-detail">初始化...</div>
                <div class="status-sub" id="recognition-hint"></div>
            </div>
        </div>
        
        <!-- 主控制按钮 -->
        <div class="control-section">
            <button class="main-button" id="voice-button" onclick="toggleVoiceRecording()">
                <div class="status-icon" id="voice-icon">🎤</div>
                <div id="voice-text">点击开始语音识别</div>
            </button>
            
            <!-- 录音波形 -->
            <div class="recording-wave" id="recording-wave">
                <div class="wave-bar" style="left: 0%; animation-delay: 0s;"></div>
                <div class="wave-bar" style="left: 10%; animation-delay: 0.1s;"></div>
                <div class="wave-bar" style="left: 20%; animation-delay: 0.2s;"></div>
                <div class="wave-bar" style="left: 30%; animation-delay: 0.3s;"></div>
                <div class="wave-bar" style="left: 40%; animation-delay: 0.4s;"></div>
                <div class="wave-bar" style="left: 50%; animation-delay: 0.5s;"></div>
                <div class="wave-bar" style="left: 60%; animation-delay: 0.6s;"></div>
                <div class="wave-bar" style="left: 70%; animation-delay: 0.7s;"></div>
                <div class="wave-bar" style="left: 80%; animation-delay: 0.8s;"></div>
                <div class="wave-bar" style="left: 90%; animation-delay: 0.9s;"></div>
            </div>
            
            <div style="margin-top: 30px; opacity: 0.8; max-width: 600px; margin-left: auto; margin-right: auto;">
                <strong>使用方法：</strong><br>
                1. 点击上方按钮开始录音<br>
                2. <strong>对着麦克风说话</strong>（任何话都可以）<br>
                3. 语音输入会<strong>立刻显示在下方</strong><br>
                4. 再次点击按钮停止录音
            </div>
        </div>
        
        <!-- 识别结果区域 -->
        <div class="results-section">
            <div class="results-title">🎯 识别结果（实时显示）</div>
            <div class="results-container" id="results-container">
                <div class="result-item system">
                    <div class="result-sender">系统通知</div>
                    <div class="result-text">等待语音输入... 请点击上方按钮开始识别</div>
                    <div class="result-time" id="current-time"></div>
                </div>
            </div>
        </div>
        
        <!-- 调试信息 -->
        <div class="debug-section">
            <div class="debug-title">🔧 调试日志</div>
            <div class="debug-log" id="debug-log">
系统初始化开始...
            </div>
        </div>
    </div>

    <script>
        // === 全局变量 ===
        let recognition = null;
        let isRecording = false;
        let permissionState = 'unknown';
        let debugLog = [];
        let lastResultTime = null;
        
        // === 工具函数 ===
        function addDebugLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('zh-CN', { 
                hour12: false,
                minute: '2-digit',
                second: '2-digit',
                fractionalSecondDigits: 2 
            });
            
            const typePrefix = type === 'error' ? '❌' : 
                              type === 'success' ? '✅' : 
                              type === 'warning' ? '⚠️' : 'ℹ️';
            
            const logEntry = `${timestamp} ${typePrefix} ${message}`;
            debugLog.push(logEntry);
            
            // 限制日志长度
            if (debugLog.length > 20) {
                debugLog = debugLog.slice(-20);
            }
            
            // 更新显示
            document.getElementById('debug-log').textContent = debugLog.join('\n');
            document.getElementById('debug-log').scrollTop = document.getElementById('debug-log').scrollHeight;
            
            console.log(`[DEBUG] ${logEntry}`);
        }
        
        function updateStatus(elementId, status, message, hint = '') {
            const element = document.getElementById(elementId);
            const detailElement = document.getElementById(elementId + '-detail');
            const hintElement = document.getElementById(elementId + '-hint');
            
            if (detailElement) detailElement.textContent = message;
            if (hintElement) hintElement.textContent = hint;
            
            // 更新状态类
            element.className = 'status-box ' + elementId.split('-')[0];
            element.classList.add(status);
        }
        
        function addResult(text, sender = '你的语音', type = 'user') {
            const container = document.getElementById('results-container');
            const timeString = new Date().toLocaleTimeString('zh-CN', { 
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            const resultItem = document.createElement('div');
            resultItem.className = `result-item ${type}`;
            resultItem.innerHTML = `
                <div class="result-sender">
                    <span>${sender}</span>
                    <span style="opacity:0.7; font-size:0.9rem;">(${timeString})</span>
                </div>
                <div class="result-text">${text}</div>
                <div class="result-time">${new Date().toLocaleTimeString('zh-CN', { second: '2-digit', fractionalSecondDigits: 2 })}</div>
            `;
            
            container.appendChild(resultItem);
            container.scrollTop = container.scrollHeight;
            lastResultTime = Date.now();
        }
        
        // === 权限检查 ===
        async function checkPermission() {
            try {
                addDebugLog('检查麦克风权限...');
                
                // 检查权限API是否可用
                if (!navigator.permissions || !navigator.permissions.query) {
                    addDebugLog('权限API不可用，使用传统方法', 'warning');
                    return updateStatus('permission-status', 'warning', '无法检查权限', '需要用户手动授权');
                }
                
                const result = await navigator.permissions.query({ name: 'microphone' });
                permissionState = result.state;
                
                addDebugLog(`麦克风权限状态: ${permissionState}`);
                
                switch (permissionState) {
                    case 'granted':
                        updateStatus('permission-status', 'active', '✅ 已授权', '可以正常使用麦克风');
                        return true;
                    case 'prompt':
                        updateStatus('permission-status', 'warning', '⏳ 等待授权', '请点击上方按钮授权');
                        return false;
                    case 'denied':
                        updateStatus('permission-status', 'error', '❌ 已拒绝', '需要手动更改浏览器设置');
                        return false;
                    default:
                        updateStatus('permission-status', 'error', '❓ 未知状态', '需要重新请求权限');
                        return false;
                }
                
            } catch (error) {
                addDebugLog(`权限检查失败: ${error.message}`, 'error');
                updateStatus('permission-status', 'error', '检查失败', error.message);
                return false;
            }
        }
        
        // === 初始化语音识别 ===
        function initSpeechRecognition() {
            addDebugLog('初始化语音识别引擎...');
            
            // 检查浏览器是否支持
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addDebugLog('浏览器不支持语音识别', 'error');
                updateStatus('recognition-status', 'error', '❌ 不支持', '请使用Chrome或Edge浏览器');
                return false;
            }
            
            try {
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';
                recognition.maxAlternatives = 3;
                
                // 设置事件监听器
                recognition.onstart = function() {
                    addDebugLog('语音识别开始', 'success');
                    updateStatus('recognition-status', 'active', '🎤 识别中...', '请开始说话');
                    
                    // 显示录音波形
                    document.getElementById('recording-wave').classList.add('active');
                    document.getElementById('voice-button').classList.add('active');
                    document.getElementById('voice-icon').textContent = '🎙️';
                    document.getElementById('voice-text').textContent = '正在识别 (点击停止)';
                    
                    addResult('语音识别已开始，请开始说话...', '系统通知', 'system');
                };
                
                recognition.onresult = function(event) {
                    const result = event.results[event.results.length - 1];
                    const transcript = result[0].transcript;
                    const confidence = result[0].confidence;
                    
                    addDebugLog(`识别结果: "${transcript}" (置信度: ${Math.round(confidence * 100)}%)`);
                    
                    // 只在最终结果（非临时）时显示
                    if (result.isFinal) {
                        addResult(transcript, '你的语音', 'special');
                        
                        // 添加AI模拟响应（可选）
                        setTimeout(() => {
                            const responses = [
                                `我听到你说："${transcript}" - 系统工作正常！`,
                                `语音识别成功！内容是："${transcript}"`,
                                `✅ 识别到：${transcript} - 测试成功`,
                                `🎯 语音输入确认：${transcript}`
                            ];
                            const response = responses[Math.floor(Math.random() * responses.length)];
                            addResult(response, '系统确认', 'system');
                        }, 500);
                    }
                };
                
                recognition.onerror = function(event) {
                    const errorMsg = event.error || '未知错误';
                    addDebugLog(`识别错误: ${errorMsg}`, 'error');
                    addResult(`语音识别错误: ${errorMsg}`, '系统错误', 'error');
                    
                    // 根据错误类型更新状态
                    if (errorMsg === 'not-allowed') {
                        updateStatus('recognition-status', 'error', '❌ 权限被拒绝', '请允许麦克风访问');
                    } else if (errorMsg === 'no-speech') {
                        updateStatus('recognition-status', 'error', '❌ 未检测到语音', '请说话或检查麦克风');
                    } else {
                        updateStatus('recognition-status', 'error', `❌ ${errorMsg}`, '语音识别错误');
                    }
                    
                    // 停止录音
                    if (isRecording) {
                        toggleVoiceRecording();
                    }
                };
                
                recognition.onend = function() {
                    addDebugLog('语音识别结束', 'warning');
                    
                    if (isRecording) {
                        // 如果用户仍在录音状态但识别结束了，尝试重新启动
                        addResult('识别会话意外结束，正在重新启动...', '系统通知', 'system');
                        setTimeout(() => {
                            if (isRecording && recognition) {
                                try {
                                    recognition.start();
                                    addDebugLog('自动重新启动识别');
                                } catch (e) {
                                    addDebugLog(`重新启动失败: ${e.message}`, 'error');
                                }
                            }
                        }, 1000);
                    } else {
                        // 正常结束
                        updateStatus('recognition-status', 'ready', '✅ 准备就绪', '点击按钮开始识别');
                        document.getElementById('recording-wave').classList.remove('active');
                    }
                };
                
                addDebugLog('语音识别引擎初始化成功', 'success');
                updateStatus('recognition-status', 'ready', '✅ 准备就绪', '引擎初始化完成');
                return true;
                
            } catch (error) {
                addDebugLog(`初始化失败: ${error.message}`, 'error');
                updateStatus('recognition-status', 'error', '❌ 初始化失败', error.message);
                return false;
            }
        }
        
        // === 主控制函数 ===
        function toggleVoiceRecording() {
            const button = document.getElementById('voice-button');
            const icon = document.getElementById('voice-icon');
            const text = document.getElementById('voice-text');
            
            if (!isRecording) {
                // 开始录音
                addDebugLog('用户点击开始录音');
                addResult('正在启动语音识别...', '系统通知', 'system');
                
                // 检查权限
                if (permissionState !== 'granted') {
                    addDebugLog('需要麦克风权限，开始请求...');
                    addResult('正在请求麦克风权限...', '系统通知', 'system');
                    
                    // 直接请求麦克风访问
                    navigator.mediaDevices.getUserMedia({ audio: true })
                        .then(stream => {
                            addDebugLog('麦克风权限获取成功', 'success');
                            addResult('麦克风权限已获得，开始识别...', '系统通知', 'system');
                            
                            // 停止流（我们只需要权限）
                            stream.getTracks().forEach(track => track.stop());
                            
                            // 更新权限状态
                            permissionState = 'granted';
                            updateStatus('permission-status', 'active', '✅ 已授权', '可以正常使用麦克风');
                            
                            // 启动语音识别
                            startRecognition();
                        })
                        .catch(error => {
                            addDebugLog(`权限请求失败: ${error.message}`, 'error');
                            addResult(`麦克风权限被拒绝: ${error.message}`, '系统错误', 'error');
                            
                            // 更新状态
                            permissionState = 'denied';
                            updateStatus('permission-status', 'error', '❌ 权限被拒绝', '请手动允许麦克风访问');
                        });
                } else {
                    // 已有权限，直接启动
                    startRecognition();
                }
                
            } else {
                // 停止录音
                addDebugLog('用户点击停止录音');
                stopRecognition();
            }
        }
        
        function startRecognition() {
            if (!recognition) {
                if (!initSpeechRecognition()) {
                    addResult('语音识别引擎初始化失败', '系统错误', 'error');
                    return;
                }
            }
            
            try {
                isRecording = true;
                recognition.start();
                addDebugLog('启动语音识别...');
                
            } catch (error) {
                addDebugLog(`启动失败: ${error.message}`, 'error');
                addResult(`启动识别失败: ${error.message}`, '系统错误', 'error');
                isRecording = false;
            }
        }
        
        function stopRecognition() {
            if (recognition && isRecording) {
                try {
                    recognition.stop();
                    isRecording = false;
                    
                    document.getElementById('voice-button').classList.remove('active');
                    document.getElementById('voice-icon').textContent = '🎤';
                    document.getElementById('voice-text').textContent = '点击开始语音识别';
                    document.getElementById('recording-wave').classList.remove('active');
                    
                    addDebugLog('停止语音识别', 'success');
                    addResult('语音识别已停止', '系统通知', 'system');
                    
                } catch (error) {
                    addDebugLog(`停止失败: ${error.message}`, 'error');
                }
            }
        }
        
        // === 页面初始化 ===
        async function initPage() {
            addResult(`页面初始化时间: ${new Date().toLocaleTimeString('zh-CN')}`, '系统通知', 'system');
            updateStatus('recognition-status', 'initializing', '⏳ 初始化中...', '检查浏览器支持');
            
            // 检查浏览器支持
            const browserSupport = {
                speechRecognition: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
                getUserMedia: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
                permissions: !!(navigator.permissions && navigator.permissions.query)
            };
            
            addDebugLog(`浏览器支持检查: ${JSON.stringify(browserSupport)}`);
            
            if (!browserSupport.speechRecognition) {
                addResult('浏览器不支持语音识别功能', '系统错误', 'error');
                updateStatus('recognition-status', 'error', '❌ 浏览器不支持', '请使用Chrome或Edge浏览器');
                document.getElementById('voice-button').disabled = true;
                document.getElementById('voice-text').textContent = '浏览器不支持';
                return;
            }
            
            // 检查权限
            const hasPermission = await checkPermission();
            
            // 初始化语音识别
            initSpeechRecognition();
            
            // 如果已有权限，启用按钮
            if (hasPermission) {
                document.getElementById('voice-button').disabled = false;
                addResult('系统准备就绪，点击按钮开始语音识别', '系统通知', 'system');
            } else {
                addResult('点击按钮请求麦克风权限', '系统通知', 'system');
            }
            
            // 更新当前时间
            setInterval(() => {
                document.getElementById('current-time').textContent = new Date().toLocaleTimeString('zh-CN');
            }, 1000);
            
            addDebugLog('页面初始化完成', 'success');
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', initPage);
        
        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (isRecording && recognition) {
                recognition.stop();
            }
        });
        
        // 自动检查权限变化
        if (navigator.permissions && navigator.permissions.query) {
            navigator.permissions.query({ name: 'microphone' }).then(permission => {
                permission.onchange = function() {
                    addDebugLog(`权限状态变化: ${this.state}`);
                    permissionState = this.state;
                    checkPermission();
                };
            });
        }
    </script>
</body>
</html>
