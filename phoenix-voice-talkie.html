<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凤凰语音对讲机 - 实时语音通信</title>
    <style>
        :root {
            --phoenix-red: #f43f5e;
            --phoenix-orange: #fb923c;
            --phoenix-gold: #fbbf24;
            --phoenix-blue: #3b82f6;
            --phoenix-green: #10b981;
            --phoenix-bg-dark: #0f1419;
            --phoenix-bg-light: #1e293b;
            --phoenix-bg-card: rgba(30, 41, 59, 0.8);
            --phoenix-text: #e2e8f0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, var(--phoenix-bg-dark), var(--phoenix-bg-light));
            color: var(--phoenix-text);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--phoenix-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .title {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--phoenix-red), var(--phoenix-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .main-container {
            flex: 1;
            display: flex;
            padding: 1rem;
            gap: 1rem;
            overflow: hidden;
        }
        
        .talkie-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .side-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 300px;
        }
        
        .card {
            background: var(--phoenix-bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 2px solid rgba(244, 63, 94, 0.3);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: var(--phoenix-orange);
            box-shadow: 0 10px 30px rgba(244, 63, 94, 0.2);
        }
        
        .card-title {
            font-size: 1.3rem;
            color: var(--phoenix-gold);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .talkie-interface {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
        }
        
        .talkie-button {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--phoenix-red), var(--phoenix-orange));
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 20px 40px rgba(244, 63, 94, 0.3);
            animation: pulse 2s infinite;
        }
        
        .talkie-button:hover {
            transform: scale(1.05);
            box-shadow: 0 25px 50px rgba(244, 63, 94, 0.4);
        }
        
        .talkie-button.active {
            background: linear-gradient(135deg, var(--phoenix-green), #34d399);
            animation: activePulse 1s infinite;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
        }
        
        .talkie-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes activePulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% { 
                transform: scale(1.03);
                box-shadow: 0 0 0 20px rgba(16, 185, 129, 0);
            }
        }
        
        .button-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }
        
        .talkie-instruction {
            margin-top: 2rem;
            font-size: 1.1rem;
            line-height: 1.6;
            text-align: center;
            max-width: 500px;
        }
        
        .talkie-instruction .highlight {
            color: var(--phoenix-gold);
            font-weight: bold;
        }
        
        .audio-waveform {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            margin-top: 2rem;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .wave-bar {
            flex: 1;
            background: var(--phoenix-orange);
            border-radius: 4px;
            margin: 0 2px;
            min-height: 10px;
            transition: height 0.1s ease;
        }
        
        .status-display {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border-left: 4px solid var(--phoenix-blue);
        }
        
        .status-item.connected {
            border-left-color: var(--phoenix-green);
        }
        
        .status-item.disconnected {
            border-left-color: var(--phoenix-red);
        }
        
        .status-label {
            font-weight: bold;
            opacity: 0.9;
        }
        
        .status-value {
            font-weight: bold;
            color: var(--phoenix-gold);
        }
        
        .conversation-log {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .message {
            padding: 1rem;
            border-radius: 10px;
            animation: fadeIn 0.3s ease;
        }
        
        .message.user {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(59, 130, 246, 0.15));
            border: 1px solid rgba(59, 130, 246, 0.4);
            margin-left: 2rem;
        }
        
        .message.ai {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(16, 185, 129, 0.15));
            border: 1px solid rgba(16, 185, 129, 0.4);
            margin-right: 2rem;
        }
        
        .message.system {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.3), rgba(251, 191, 36, 0.15));
            border: 1px solid rgba(251, 191, 36, 0.4);
            text-align: center;
            font-size: 0.9rem;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .message-sender {
            font-weight: bold;
        }
        
        .message-time {
            font-style: italic;
        }
        
        .message-text {
            font-size: 1.1rem;
            line-height: 1.4;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .volume-display {
            margin-top: 1rem;
            text-align: center;
        }
        
        .volume-bar {
            height: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 0.5rem;
            position: relative;
        }
        
        .volume-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--phoenix-green), var(--phoenix-gold));
            border-radius: 15px;
            width: 0%;
            transition: width 0.2s ease;
        }
        
        .connection-animation {
            position: absolute;
            top: -10px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .control-button {
            flex: 1;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: var(--phoenix-text);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .control-button:hover:not(:disabled) {
            background: rgba(244,63,94,0.2);
            border-color: var(--phoenix-orange);
        }
        
        .control-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }
            
            .side-panel {
                min-width: 100%;
            }
            
            .talkie-button {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div>
            <h1 class="title">凤凰语音对讲机</h1>
            <div class="subtitle">实时语音通信系统 - 按下说话，松开收听</div>
        </div>
        <div class="connection-animation" id="connection-animation">
            <span id="ping-display">延迟检测中...</span>
        </div>
    </header>
    
    <div class="main-container">
        <!-- 主对讲界面 -->
        <div class="talkie-container">
            <div class="card talkie-interface">
                <h2 class="card-title">🎤 对讲机控制</h2>
                
                <button class="talkie-button" id="talkie-btn">
                    <div class="button-icon" id="talkie-icon">🎤</div>
                    <span id="talkie-text">按住说话</span>
                </button>
                
                <div class="talkie-instruction">
                    <p><span class="highlight">使用方法：</span></p>
                    <p>1. <span class="highlight">点击按钮开始录音</span> - 对凤凰AI讲话</p>
                    <p>2. <span class="highlight">松开按钮结束录音</span> - AI将立即回复</p>
                    <p>3. <span class="highlight">听到提示音</span> - 等待AI语音回复</p>
                    <p>4. 循环对话 - 体验真实对讲机交互</p>
                </div>
                
                <div class="audio-waveform" id="audio-waveform">
                    <!-- 动态波形图 -->
                </div>
                
                <div class="volume-display">
                    <div>输入音量</div>
                    <div class="volume-bar">
                        <div class="volume-fill" id="volume-fill"></div>
                    </div>
                </div>
                
                <div class="controls">
                    <button class="control-button" id="connect-btn" onclick="connectWebSocket()">
                        🔗 连接服务
                    </button>
                    <button class="control-button" id="test-audio-btn" onclick="testAudio()">
                        🔊 测试音频
                    </button>
                    <button class="control-button" id="simulate-btn" onclick="simulateConversation()">
                        🤖 模拟对话
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 侧边栏 -->
        <div class="side-panel">
            <!-- 系统状态 -->
            <div class="card">
                <h2 class="card-title">📊 系统状态</h2>
                <div class="status-display">
                    <div class="status-item connected" id="ws-status">
                        <span class="status-label">WebSocket连接</span>
                        <span class="status-value" id="ws-value">未连接</span>
                    </div>
                    <div class="status-item" id="voice-status">
                        <span class="status-label">语音会话状态</span>
                        <span class="status-value" id="voice-value">未开始</span>
                    </div>
                    <div class="status-item" id="delay-status">
                        <span class="status-label">当前延迟</span>
                        <span class="status-value" id="delay-value">- ms</span>
                    </div>
                    <div class="status-item" id="duration-status">
                        <span class="status-label">会话时长</span>
                        <span class="status-value" id="duration-value">0:00</span>
                    </div>
                </div>
            </div>
            
            <!-- 对话记录 -->
            <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                <h2 class="card-title">💬 对话记录</h2>
                <div class="conversation-log" id="conversation-log">
                    <div class="message system">
                        <div class="message-header">
                            <span class="message-sender">系统通知</span>
                            <span class="message-time">刚刚</span>
                        </div>
                        <div class="message-text">
                            凤凰语音对讲系统已准备就绪<br>
                            连接后即可开始实时语音对话
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = 'ws://localhost:3004';
        let ws = null;
        let clientId = null;
        let sessionId = null;
        let isRecording = false;
        let isConnected = false;
        let sessionStartTime = null;
        let pingInterval = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let rafId = null;
        
        // 初始化WebSocket连接
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addSystemMessage('WebSocket已连接');
                return;
            }
            
            updateStatus('ws', 'connecting', '连接中...');
            
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = () => {
                    console.log('✅ WebSocket连接成功');
                    isConnected = true;
                    updateStatus('ws', 'connected', '已连接');
                    addSystemMessage('实时语音服务连接成功');
                    
                    // 启动心跳检测
                    startPingPong();
                };
                
                ws.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        handleServerMessage(message);
                    } catch (error) {
                        console.error('消息解析错误:', error);
                    }
                };
                
                ws.onclose = () => {
                    console.log('🔌 WebSocket连接关闭');
                    isConnected = false;
                    updateStatus('ws', 'disconnected', '已断开');
                    addSystemMessage('语音服务连接已断开');
                    stopPingPong();
                    stopAudioWaveform();
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket错误:', error);
                    updateStatus('ws', 'error', '连接错误');
                    addSystemMessage('语音服务连接错误');
                };
                
            } catch (error) {
                console.error('连接失败:', error);
                updateStatus('ws', 'error', `连接失败: ${error.message}`);
                addSystemMessage(`连接失败: ${error.message}`);
            }
        }
        
        // 处理服务器消息
        function handleServerMessage(message) {
            console.log('收到服务器消息:', message);
            
            switch (message.type) {
                case 'welcome':
                    clientId = message.clientId;
                    addSystemMessage(`连接成功，客户端ID: ${clientId}`);
                    startVoiceSession();
                    break;
                    
                case 'session_started':
                    sessionId = message.sessionId;
                    sessionStartTime = new Date();
                    updateStatus('voice', 'listening', '监听中');
                    addSystemMessage(`语音会话开始: ${sessionId}`);
                    break;
                    
                case 'session_stopped':
                    updateStatus('voice', 'idle', '空闲');
                    addSystemMessage('语音会话已结束');
                    break;
                    
                case 'voice_recognition':
                    addUserMessage(message.text, message.confidence);
                    break;
                    
                case 'ai_response':
                    addAIMessage(message.text);
                    break;
                    
                case 'tts_audio_ready':
                    addSystemMessage(`AI语音回复已生成 (${message.duration}s)`);
                    // 在实际实现中，这里应该播放音频
                    break;
                    
                case 'pong':
                    const latency = Date.now() - message.timestamp;
                    updateStatus('delay', 'normal', `${latency}ms`);
                    document.getElementById('ping-display').textContent = `延迟: ${latency}ms`;
                    break;
                    
                case 'text_response':
                    addAIMessage(message.text);
                    break;
                    
                default:
                    console.log('未知消息类型:', message);
            }
        }
        
        // 开始语音会话
        function startVoiceSession() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                console.error('WebSocket未连接');
                return;
            }
            
            const message = {
                type: 'start_session',
                sessionId: `user_session_${Date.now()}`,
                timestamp: Date.now()
            };
            
            ws.send(JSON.stringify(message));
            
            // 初始化音频录制
            initAudioRecording();
        }
        
        // 初始化音频录制
        async function initAudioRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    } 
                });
                
                // 设置音频分析器
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                source.connect(analyser);
                
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                // 设置MediaRecorder
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus',
                    audioBitsPerSecond: 16000
                });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        // 这里可以发送音频数据到服务器
                        // 在真实部署中，这里应该发送二进制数据
                        console.log('录音结束，生成音频数据');
                        
                        // 模拟发送到服务器
                        simulateAudioProcessing();
                        
                        // 清空数据
                        audioChunks = [];
                    }
                };
                
                console.log('✅ 音频录制初始化成功');
                updateStatus('voice', 'ready', '就绪');
                
                // 启用对讲按钮
                enableTalkieButton(true);
                
            } catch (error) {
                console.error('音频初始化失败:', error);
                addSystemMessage(`音频初始化失败: ${error.message}`);
                updateStatus('voice', 'error', '初始化失败');
                enableTalkieButton(false);
            }
        }
        
        // 模拟音频处理
        function simulateAudioProcessing() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            
            // 模拟发送音频数据
            const audioMessage = {
                type: 'audio_data',
                timestamp: Date.now(),
                size: Math.floor(Math.random() * 5000) + 1000
            };
            
            ws.send(JSON.stringify(audioMessage));
            
            // 模拟服务器处理延迟
            setTimeout(() => {
                if (ws.readyState === WebSocket.OPEN) {
                    // 模拟语音识别结果
                    const mockText = getRandomPhrase();
                    ws.send(JSON.stringify({
                        type: 'text_message',
                        text: '模拟语音识别完成',
                        timestamp: Date.now()
                    }));
                }
            }, 500);
        }
        
        function getRandomPhrase() {
            const phrases = [
                '你好，我听到了你的声音',
                '语音质量很好，清晰度不错',
                '实时对讲系统工作正常',
                '继续说话，我在认真听',
                '当前网络连接稳定',
                '凤凰语音对讲体验很棒',
                '请继续对话，我准备好回答了',
                '录音时长适中，内容清晰'
            ];
            return phrases[Math.floor(Math.random() * phrases.length)];
        }
        
        // 对讲按钮事件
        const talkieBtn = document.getElementById('talkie-btn');
        talkieBtn.addEventListener('mousedown', startRecording);
        talkieBtn.addEventListener('mouseup', stopRecording);
        talkieBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        talkieBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });
        
        function startRecording() {
            if (!isRecording && mediaRecorder && mediaRecorder.state === 'inactive') {
                isRecording = true;
                audioChunks = [];
                
                talkieBtn.classList.add('active');
                document.getElementById('talkie-text').textContent = '松开结束';
                document.getElementById('talkie-icon').textContent = '🎙️';
                
                mediaRecorder.start();
                startAudioWaveform();
                
                addSystemMessage('🎤 开始录音...');
            }
        }
        
        function stopRecording() {
            if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                isRecording = false;
                
                talkieBtn.classList.remove('active');
                document.getElementById('talkie-text').textContent = '按住说话';
                document.getElementById('talkie-icon').textContent = '🎤';
                
                mediaRecorder.stop();
                stopAudioWaveform();
                
                addSystemMessage('⏹️ 录音结束，正在处理...');
            }
        }
        
        // 音频波形可视化
        function startAudioWaveform() {
            if (!analyser) return;
            
            const waveContainer = document.getElementById('audio-waveform');
            waveContainer.innerHTML = '';
            
            // 创建32个波形条
            for (let i = 0; i < 32; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                waveContainer.appendChild(bar);
            }
            
            const bars = waveContainer.querySelectorAll('.wave-bar');
            
            function drawWaveform() {
                if (!isRecording || !analyser) {
                    rafId = null;
                    return;
                }
                
                analyser.getByteFrequencyData(dataArray);
                
                // 计算平均音量
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                const avg = sum / dataArray.length;
                
                // 更新音量条
                const volumePercent = (avg / 256) * 100;
                document.getElementById('volume-fill').style.width = `${volumePercent}%`;
                
                // 更新波形
                for (let i = 0; i < bars.length; i++) {
                    const barIndex = Math.floor(i * dataArray.length / bars.length);
                    const barHeight = (dataArray[barIndex] / 256) * 100;
                    bars[i].style.height = `${Math.max(barHeight, 10)}%`;
                }
                
                rafId = requestAnimationFrame(drawWaveform);
            }
            
            rafId = requestAnimationFrame(drawWaveform);
        }
        
        function stopAudioWaveform() {
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
            
            // 重置波形
            const bars = document.querySelectorAll('.wave-bar');
            bars.forEach(bar => {
                bar.style.height = '10%';
            });
            
            document.getElementById('volume-fill').style.width = '0%';
        }
        
        // 心跳检测
        function startPingPong() {
            if (pingInterval) clearInterval(pingInterval);
            
            pingInterval = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'ping',
                        timestamp: Date.now()
                    }));
                }
            }, 5000);
        }
        
        function stopPingPong() {
            if (pingInterval) {
                clearInterval(pingInterval);
                pingInterval = null;
            }
        }
        
        // 更新会话时长
        function updateSessionDuration() {
            if (sessionStartTime) {
                const now = new Date();
                const diff = Math.floor((now - sessionStartTime) / 1000);
                const minutes = Math.floor(diff / 60);
                const seconds = diff % 60;
                const durationStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                document.getElementById('duration-value').textContent = durationStr;
            }
        }
        
        // 更新状态显示
        function updateStatus(type, status, text) {
            switch (type) {
                case 'ws':
                    const wsItem = document.getElementById('ws-status');
                    const wsValue = document.getElementById('ws-value');
                    
                    wsValue.textContent = text;
                    wsItem.className = `status-item ${status}`;
                    break;
                    
                case 'voice':
                    document.getElementById('voice-value').textContent = text;
                    break;
                    
                case 'delay':
                    document.getElementById('delay-value').textContent = text;
                    break;
            }
        }
        
        // 启用/禁用对讲按钮
        function enableTalkieButton(enabled) {
            const talkieBtn = document.getElementById('talkie-btn');
            talkieBtn.disabled = !enabled;
        }
        
        // 添加消息到对话记录
        function addSystemMessage(text) {
            addMessage('system', text);
        }
        
        function addUserMessage(text, confidence) {
            let messageText = text;
            if (confidence) {
                messageText += ` (置信度: ${Math.round(confidence * 100)}%)`;
            }
            addMessage('user', messageText);
        }
        
        function addAIMessage(text) {
            addMessage('ai', text);
        }
        
        function addMessage(type, text) {
            const logDiv = document.getElementById('conversation-log');
            const messageDiv = document.createElement('div');
            
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${type === 'system' ? '系统通知' : type === 'user' ? '你' : '凤凰AI'}</span>
                    <span class="message-time">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</span>
                </div>
                <div class="message-text">${text}</div>
            `;
            
            logDiv.appendChild(messageDiv);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // 测试功能
        function testAudio() {
            addSystemMessage('🔊 测试音频播放...');
            
            // 模拟音频测试
            setTimeout(() => {
                addSystemMessage('✅ 音频测试完成，系统正常');
            }, 1000);
        }
        
        function simulateConversation() {
            addSystemMessage('🤖 开始模拟对话...');
            
            const userPhrases = [
                '你好，凤凰AI',
                '系统状态如何',
                '现在几点钟了',
                '测试语音通信是否正常'
            ];
            
            const aiResponses = [
                '你好！我是凤凰AI，很高兴与你对话。',
                '系统运行正常，所有服务在线，延迟稳定。',
                `现在是 ${new Date().toLocaleTimeString('zh-CN')}，欢迎查询。`,
                '语音通信测试通过，实时对讲功能正常。'
            ];
            
            let index = 0;
            
            function nextMessage() {
                if (index >= userPhrases.length) {
                    addSystemMessage('✅ 模拟对话结束');
                    return;
                }
                
                // 用户消息
                setTimeout(() => {
                    addUserMessage(userPhrases[index]);
                    
                    // AI回复
                    setTimeout(() => {
                        addAIMessage(aiResponses[index]);
                        index++;
                        nextMessage();
                    }, 800);
                }, 1200);
            }
            
            nextMessage();
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            addSystemMessage('🚀 凤凰语音对讲系统初始化...');
            
            // 自动连接服务
            setTimeout(() => {
                connectWebSocket();
            }, 1000);
            
            // 更新会话时长
            setInterval(updateSessionDuration, 1000);
        });
        
        // 防止页面滚动手势
        document.addEventListener('touchmove', (e) => {
            if (isRecording) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
