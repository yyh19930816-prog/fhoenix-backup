<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凤凰自动语音对话 - 一键沟通</title>
    <style>
        :root {
            --phoenix-red: #f43f5e;
            --phoenix-orange: #fb923c;
            --phoenix-gold: #fbbf24;
            --phoenix-green: #10b981;
            --phoenix-blue: #3b82f6;
            --phoenix-bg-dark: #0f1419;
            --phoenix-bg-light: #1e293b;
            --phoenix-text: #e2e8f0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, var(--phoenix-bg-dark), var(--phoenix-bg-light));
            color: var(--phoenix-text);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--phoenix-red);
            text-align: center;
        }
        
        .title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--phoenix-red), var(--phoenix-orange), var(--phoenix-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .main-container {
            flex: 1;
            display: flex;
            padding: 2rem;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-width: 400px;
        }
        
        .conversation-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .start-button-container {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 20px;
            border: 3px solid rgba(244, 63, 94, 0.3);
            transition: all 0.3s ease;
        }
        
        .start-button-container:hover {
            border-color: var(--phoenix-orange);
            box-shadow: 0 15px 40px rgba(244, 63, 94, 0.2);
        }
        
        .start-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--phoenix-red), var(--phoenix-orange));
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 20px 50px rgba(244, 63, 94, 0.4);
            margin: 0 auto;
        }
        
        .start-button:hover {
            transform: scale(1.05);
            box-shadow: 0 25px 60px rgba(244, 63, 94, 0.5);
        }
        
        .start-button.active {
            background: linear-gradient(135deg, var(--phoenix-green), #34d399);
            animation: activePulse 1.5s infinite;
            box-shadow: 0 20px 50px rgba(16, 185, 129, 0.4);
        }
        
        .start-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            animation: none;
            box-shadow: none;
        }
        
        @keyframes activePulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% { 
                transform: scale(1.03);
                box-shadow: 0 0 0 30px rgba(16, 185, 129, 0);
            }
        }
        
        .status-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 1.5rem;
            border: 2px solid rgba(59, 130, 246, 0.3);
        }
        
        .status-title {
            font-size: 1.2rem;
            color: var(--phoenix-gold);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .status-item {
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border-left: 4px solid var(--phoenix-blue);
        }
        
        .status-item.connected {
            border-left-color: var(--phoenix-green);
        }
        
        .status-item.error {
            border-left-color: var(--phoenix-red);
        }
        
        .status-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0.3rem;
        }
        
        .status-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--phoenix-gold);
        }
        
        .conversation-display {
            flex: 1;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 2rem;
            border: 2px solid rgba(244, 63, 94, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .conversation-log {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            padding: 1.2rem;
            border-radius: 12px;
            animation: slideIn 0.4s ease;
            max-width: 85%;
        }
        
        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        
        .message.user {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(59, 130, 246, 0.15));
            border: 1px solid rgba(59, 130, 246, 0.4);
            margin-left: auto;
        }
        
        .message.ai {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(16, 185, 129, 0.15));
            border: 1px solid rgba(16, 185, 129, 0.4);
            margin-right: auto;
        }
        
        .message.system {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.3), rgba(251, 191, 36, 0.15));
            border: 1px solid rgba(251, 191, 36, 0.4);
            text-align: center;
            margin: 0 auto;
            max-width: 90%;
        }
        
        .message-sender {
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            color: var(--phoenix-text);
        }
        
        .message-text {
            font-size: 1.2rem;
            line-height: 1.4;
        }
        
        .visualization-container {
            text-align: center;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 1.5rem;
            border: 2px solid rgba(244, 63, 94, 0.3);
        }
        
        .visualization-title {
            font-size: 1.2rem;
            color: var(--phoenix-gold);
            margin-bottom: 1rem;
        }
        
        .audio-waveform {
            height: 120px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 10px;
        }
        
        .wave-bar {
            flex: 1;
            background: linear-gradient(to top, var(--phoenix-orange), var(--phoenix-red));
            border-radius: 3px;
            min-height: 5px;
            transition: height 0.1s ease;
        }
        
        .state-indicators {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }
        
        .indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .indicator-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--phoenix-red);
            transition: all 0.3s ease;
        }
        
        .indicator-dot.active {
            background: var(--phoenix-green);
            box-shadow: 0 0 20px var(--phoenix-green);
        }
        
        .indicator-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .debug-console {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            max-height: 150px;
            margin-top: 1rem;
        }
        
        .debug-entry {
            margin-bottom: 0.3rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }
        
        .debug-entry.error {
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
        }
        
        .debug-entry.success {
            background: rgba(16,185,129,0.2);
            color: #86efac;
        }
        
        .debug-entry.info {
            background: rgba(59,130,246,0.2);
            color: #93c5fd;
        }
        
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }
            
            .control-panel {
                min-width: 100%;
            }
            
            .start-button {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="title">凤凰自动语音对话</h1>
        <p style="margin-top: 0.5rem;">一键点击，自动沟通 - 简化的语音交互体验</p>
    </header>
    
    <div class="main-container">
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="start-button-container">
                <h2 style="margin-bottom: 2rem; color: var(--phoenix-gold);">🎤 开始自动对话</h2>
                <button class="start-button" id="start-button">
                    <div style="font-size: 3rem; margin-bottom: 0.5rem;" id="button-icon">🚀</div>
                    <span id="button-text">点击开始对话</span>
                </button>
                <p style="margin-top: 2rem; opacity: 0.9; line-height: 1.5;">
                    <strong>工作原理:</strong><br>
                    点击按钮 → 启动语音识别 → 自动听你说 → AI回答 → 继续监听<br>
                    无需按住不放，一键开启完整的对话流程
                </p>
            </div>
            
            <div class="status-card">
                <h3 class="status-title">📊 系统状态</h3>
                <div class="status-grid">
                    <div class="status-item" id="connection-status">
                        <div class="status-label">语音服务连接</div>
                        <div class="status-value" id="connection-value">未连接</div>
                    </div>
                    <div class="status-item" id="audio-status">
                        <div class="status-label">音频设备状态</div>
                        <div class="status-value" id="audio-value">未检测</div>
                    </div>
                    <div class="status-item" id="recognition-status">
                        <div class="status-label">语音识别状态</div>
                        <div class="status-value" id="recognition-value">待机</div>
                    </div>
                    <div class="status-item" id="ai-status">
                        <div class="status-label">AI响应状态</div>
                        <div class="status-value" id="ai-value">就绪</div>
                    </div>
                </div>
            </div>
            
            <div class="visualization-container">
                <h3 class="visualization-title">🔊 音频可视化</h3>
                <div class="audio-waveform" id="audio-waveform">
                    <!-- 波形条将动态生成 -->
                </div>
                <div class="state-indicators">
                    <div class="indicator">
                        <div class="indicator-dot" id="mic-indicator"></div>
                        <div class="indicator-label">麦克风</div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-dot" id="listening-indicator"></div>
                        <div class="indicator-label">监听中</div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-dot" id="processing-indicator"></div>
                        <div class="indicator-label">处理中</div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-dot" id="speaking-indicator"></div>
                        <div class="indicator-label">AI回复</div>
                    </div>
                </div>
            </div>
            
            <div class="debug-console" id="debug-console">
                <!-- 调试信息将动态显示 -->
            </div>
        </div>
        
        <!-- 对话面板 -->
        <div class="conversation-panel">
            <div class="conversation-display">
                <h3 style="color: var(--phoenix-gold); margin-bottom: 1rem;">💬 对话记录</h3>
                <div class="conversation-log" id="conversation-log">
                    <div class="message system">
                        <div class="message-sender">系统通知</div>
                        <div class="message-text">
                            欢迎使用凤凰自动语音对话系统<br>
                            点击"开始对话"按钮即可与AI进行流畅的语音交流
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 系统状态
        let isActive = false;
        let recognition = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let rafId = null;
        let debugCount = 0;
        
        // 初始化系统
        async function initializeSystem() {
            addDebug('🔍 正在初始化系统...', 'info');
            
            // 检查浏览器支持
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                addDebug('❌ 浏览器不支持语音识别API', 'error');
                updateStatus('recognition', 'error', '不支持');
                displayError('您的浏览器不支持语音识别功能，请使用 Chrome 或 Edge 最新版本');
                return false;
            }
            
            // 检查麦克风权限
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                addDebug('✅ 麦克风权限获取成功', 'success');
                updateStatus('audio', 'connected', '已连接');
                setupAudioAnalysis(stream);
                
                // 更新指示灯
                document.getElementById('mic-indicator').classList.add('active');
                
            } catch (error) {
                addDebug(`❌ 麦克风权限失败: ${error.message}`, 'error');
                updateStatus('audio', 'error', '权限拒绝');
                displayError('无法访问麦克风，请确保已授予麦克风权限');
                return false;
            }
            
            // 初始化语音识别
            initSpeechRecognition();
            
            // 更新状态
            updateStatus('connection', 'connected', '已连接');
            updateStatus('ai', 'ready', '就绪');
            
            addDebug('✅ 系统初始化完成，准备开始对话', 'success');
            return true;
        }
        
        // 设置音频分析
        function setupAudioAnalysis(stream) {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                source.connect(analyser);
                
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                // 创建音频波形条
                createWaveformBars();
                
            } catch (error) {
                console.error('音频分析设置失败:', error);
                addDebug('⚠️ 音频分析初始化失败，可视化功能受限', 'info');
            }
        }
        
        // 创建波形条
        function createWaveformBars() {
            const waveContainer = document.getElementById('audio-waveform');
            waveContainer.innerHTML = '';
            
            for (let i = 0; i < 32; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                bar.style.height = '10px';
                waveContainer.appendChild(bar);
            }
        }
        
        // 更新波形
        function updateWaveform() {
            if (!analyser || !isActive) {
                if (rafId) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
                return;
            }
            
            analyser.getByteFrequencyData(dataArray);
            const bars = document.querySelectorAll('.wave-bar');
            
            // 计算平均音量
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const avg = sum / dataArray.length;
            
            // 更新波形条
            for (let i = 0; i < bars.length; i++) {
                const barIndex = Math.floor(i * dataArray.length / bars.length);
                const barHeight = (dataArray[barIndex] / 256) * 120;
                bars[i].style.height = `${Math.max(barHeight, 5)}px`;
            }
            
            rafId = requestAnimationFrame(updateWaveform);
        }
        
        // 初始化语音识别
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.lang = 'zh-CN';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;
            
            recognition.onstart = () => {
                addDebug('🎤 语音识别已启动，开始监听...', 'success');
                updateStatus('recognition', 'active', '监听中');
                document.getElementById('listening-indicator').classList.add('active');
                
                // 开始波形更新
                updateWaveform();
            };
            
            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                if (finalTranscript.trim()) {
                    console.log('最终识别结果:', finalTranscript);
                    handleSpeechResult(finalTranscript);
                } else if (interimTranscript.trim()) {
                    // 实时显示中间结果
                    // console.log('中间结果:', interimTranscript);
                }
            };
            
            recognition.onerror = (event) => {
                addDebug(`❌ 语音识别错误: ${event.error}`, 'error');
                updateStatus('recognition', 'error', event.error);
                document.getElementById('listening-indicator').classList.remove('active');
                
                if (event.error === 'no-speech' || event.error === 'audio-capture') {
                    // 静默恢复
                    setTimeout(() => {
                        if (isActive) {
                            recognition.start();
                        }
                    }, 1000);
                }
            };
            
            recognition.onend = () => {
                addDebug('⏹️ 语音识别会话结束', 'info');
                document.getElementById('listening-indicator').classList.remove('active');
                
                // 如果仍然活跃，重新启动
                if (isActive) {
                    setTimeout(() => {
                        recognition.start();
                    }, 500);
                }
            };
            
            addDebug('✅ 语音识别引擎初始化成功', 'success');
            updateStatus('recognition', 'ready', '准备就绪');
        }
        
        // 处理语音结果
        async function handleSpeechResult(text) {
            if (!text.trim() || !isActive) return;
            
            // 显示用户消息
            addUserMessage(text);
            
            // 更新状态
            document.getElementById('processing-indicator').classList.add('active');
            updateStatus('ai', 'processing', '处理中');
            
            // 模拟AI处理延迟
            await new Promise(resolve => setTimeout(resolve, 500 + Math.random() * 500));
            
            // 生成AI回复
            const response = generateAIResponse(text);
            
            // 显示AI回复
            addAIMessage(response);
            
            // 更新状态
            document.getElementById('processing-indicator').classList.remove('active');
            document.getElementById('speaking-indicator').classList.add('active');
            updateStatus('ai', 'speaking', '回复中');
            
            // 模拟TTS播放
            setTimeout(() => {
                document.getElementById('speaking-indicator').classList.remove('active');
                updateStatus('ai', 'ready', '就绪');
                
                // 继续监听
                addDebug('🔄 AI回复完成，继续监听...', 'info');
            }, 1000 + response.length * 50);
        }
        
        // 生成AI回复
        function generateAIResponse(text) {
            const lowerText = text.toLowerCase();
            const responses = [
                `我理解您的意思："${text}"。有什么其他可以帮助您的吗？`,
                `明白了。关于"${text}"，我可以提供相关信息和帮助。`,
                `好的，我听到了您的需求。关于"${text}"，凤凰系统可以协助处理。`,
                `谢谢分享。"${text}"这个话题很有趣，我可以与您详细探讨。`,
                `理解您的想法。关于"${text}"，我有一些建议可以分享。`,
                `好的，收到消息。关于"${text}"，需要我做什么具体帮助？`
            ];
            
            // 特殊关键词回复
            if (lowerText.includes('你好') || lowerText.includes('在吗')) {
                return '你好！我是凤凰AI，很高兴与您对话。有什么可以帮您的？';
            } else if (lowerText.includes('时间')) {
                return `现在是 ${new Date().toLocaleTimeString('zh-CN')}，今天日期是 ${new Date().toLocaleDateString('zh-CN')}`;
            } else if (lowerText.includes('日期')) {
                return `今天是 ${new Date().toLocaleDateString('zh-CN')}，星期${'日一二三四五六'[new Date().getDay()]}`;
            } else if (lowerText.includes('凤凰')) {
                return '凤凰系统正在运行中，语音对话功能工作正常。需要其他帮助吗？';
            } else if (lowerText.includes('状态') || lowerText.includes('系统')) {
                return '系统状态良好，所有功能正常，语音识别准确率稳定。';
            } else if (lowerText.includes('天气')) {
                return '目前无法获取实时天气信息，但您可以询问其他问题。';
            } else if (lowerText.includes('谢谢') || lowerText.includes('谢谢您')) {
                return '不客气！随时准备为您服务。还有什么需要帮助的吗？';
            } else if (lowerText.includes('再见') || lowerText.includes('拜拜')) {
                return '再见！随时欢迎再次使用凤凰语音系统。';
            } else if (lowerText.length < 3) {
                return '我听到了您的声音，但内容不够清晰。可以再详细说一下吗？';
            }
            
            return responses[Math.floor(Math.random() * responses.length)];
        }
        
        // 切换对话状态
        async function toggleConversation() {
            const button = document.getElementById('start-button');
            const icon = document.getElementById('button-icon');
            const text = document.getElementById('button-text');
            
            if (!isActive) {
                // 开始对话
                addDebug('🚀 启动语音对话...', 'info');
                
                // 初始化系统（如果尚未初始化）
                if (!recognition) {
                    const initialized = await initializeSystem();
                    if (!initialized) return;
                }
                
                isActive = true;
                button.classList.add('active');
                icon.textContent = '🎙️';
                text.textContent = '对话进行中';
                
                addSystemMessage('🎤 开始语音对话，请开始说话...');
                
                // 启动语音识别
                try {
                    recognition.start();
                    addDebug('✅ 语音识别已启动，正在监听您的语音', 'success');
                } catch (error) {
                    addDebug(`❌ 启动失败: ${error.message}`, 'error');
                    isActive = false;
                    button.classList.remove('active');
                    icon.textContent = '🚀';
                    text.textContent = '点击开始对话';
                }
                
            } else {
                // 停止对话
                addDebug('⏹️ 停止语音对话...', 'info');
                
                isActive = false;
                button.classList.remove('active');
                icon.textContent = '🚀';
                text.textContent = '点击开始对话';
                
                addSystemMessage('⏹️ 语音对话已停止');
                
                // 停止语音识别
                if (recognition) {
                    recognition.stop();
                }
                
                // 停止波形更新
                if (rafId) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
                
                // 重置指示灯
                document.querySelectorAll('.indicator-dot').forEach(dot => {
                    dot.classList.remove('active');
                });
                
                updateStatus('recognition', 'idle', '已停止');
                updateStatus('ai', 'ready', '就绪');
            }
        }
        
        // 添加调试信息
        function addDebug(message, type = 'info') {
            const consoleEl = document.getElementById('debug-console');
            const entry = document.createElement('div');
            entry.className = `debug-entry ${type}`;
            
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.textContent = `[${time}] ${message}`;
            
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            
            debugCount++;
            
            // 限制调试信息数量
            if (debugCount > 20) {
                consoleEl.removeChild(consoleEl.firstChild);
            }
        }
        
        // 更新状态显示
        function updateStatus(type, status, text) {
            const element = document.getElementById(`${type}-status`);
            const valueEl = document.getElementById(`${type}-value`);
            
            if (element && valueEl) {
                valueEl.textContent = text;
                element.className = `status-item ${status}`;
            }
        }
        
        // 显示错误信息
        function displayError(message) {
            const log = document.getElementById('conversation-log');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message system';
            errorDiv.innerHTML = `
                <div class="message-sender">系统错误</div>
                <div class="message-text" style="color: #fca5a5;">❌ ${message}</div>
            `;
            log.appendChild(errorDiv);
            log.scrollTop = log.scrollHeight;
        }
        
        // 添加系统消息
        function addSystemMessage(text) {
            addMessage('system', text, '系统通知');
        }
        
        // 添加用户消息
        function addUserMessage(text) {
            addMessage('user', text, '你');
        }
        
        // 添加AI消息
        function addAIMessage(text) {
            addMessage('ai', text, '凤凰AI');
        }
        
        // 添加消息到对话记录
        function addMessage(type, text, sender) {
            const log = document.getElementById('conversation-log');
            const messageDiv = document.createElement('div');
            
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `
                <div class="message-sender">${sender}</div>
                <div class="message-text">${text}</div>
            `;
            
            log.appendChild(messageDiv);
            log.scrollTop = log.scrollHeight;
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            addDebug('🔄 凤凰自动语音对话系统加载完成', 'info');
            
            // 设置按钮事件
            document.getElementById('start-button').addEventListener('click', toggleConversation);
            
            // 创建初始波形条
            createWaveformBars();
            
            // 预初始化麦克风权限
            setTimeout(() => {
                addDebug('🔍 正在检查音频设备...', 'info');
                initializeSystem().then(initialized => {
                    if (initialized) {
                        addDebug('✅ 系统预初始化成功，点击按钮即可开始', 'success');
                        document.getElementById('start-button').disabled = false;
                    } else {
                        addDebug('⚠️ 系统初始化失败，可能需要手动授权', 'error');
                        document.getElementById('start-button').disabled = false;
                        document.getElementById('start-button').innerHTML = `
                            <div style="font-size: 3rem; margin-bottom: 0.5rem;">🔧</div>
                            <span>需要麦克风权限</span>
                        `;
                    }
                });
            }, 1000);
        });
        
        // 安全清理
        window.addEventListener('beforeunload', () => {
            if (recognition && isActive) {
                recognition.stop();
            }
            
            if (rafId) {
                cancelAnimationFrame(rafId);
            }
            
            if (audioContext) {
                audioContext.close();
            }
        });
    </script>
</body>
</html>
