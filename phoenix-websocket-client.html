<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凤凰WebSocket实时通信</title>
    <style>
        :root {
            --phoenix-red: #f43f5e;
            --phoenix-orange: #fb923c;
            --phoenix-gold: #fbbf24;
            --phoenix-bg-dark: #0f1419;
            --phoenix-bg-light: #1e293b;
            --phoenix-text: #e2e8f0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, var(--phoenix-bg-dark), var(--phoenix-bg-light));
            color: var(--phoenix-text);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--phoenix-red);
            text-align: center;
        }
        
        .title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--phoenix-red), var(--phoenix-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            gap: 2rem;
        }
        
        .control-panel {
            flex: 1;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }
        
        .communication-panel {
            flex: 2;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid rgba(244, 63, 94, 0.3);
            display: flex;
            flex-direction: column;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .status-connected {
            background: rgba(16,185,129,0.15);
            color: #86efac;
            border: 1px solid rgba(16,185,129,0.3);
        }
        
        .status-disconnected {
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
        }
        
        .status-connecting {
            background: rgba(251,191,36,0.15);
            color: #fde68a;
            border: 1px solid rgba(251,191,36,0.3);
        }
        
        .button {
            background: linear-gradient(135deg, var(--phoenix-red), var(--phoenix-orange));
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 0.5rem 0;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.3);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .message-log {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(15,20,25,0.5);
            border-radius: 8px;
            margin-bottom: 1rem;
            min-height: 400px;
        }
        
        .message {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: rgba(59,130,246,0.2);
            margin-left: auto;
            border: 1px solid rgba(59,130,246,0.3);
            max-width: 80%;
        }
        
        .message.bot {
            background: rgba(16,185,129,0.2);
            margin-right: auto;
            border: 1px solid rgba(16,185,129,0.3);
            max-width: 80%;
        }
        
        .message.system {
            background: rgba(251,191,36,0.2);
            margin: 0 auto;
            border: 1px solid rgba(251,191,36,0.3);
            max-width: 90%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .input-group {
            display: flex;
            gap: 1rem;
        }
        
        .input-field {
            flex: 1;
            padding: 0.75rem;
            background: rgba(15,20,25,0.8);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--phoenix-text);
            font-size: 1rem;
        }
        
        .audio-visualization {
            height: 80px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin: 1rem 0;
            overflow: hidden;
            position: relative;
            display: none;
        }
        
        .wave-bar {
            width: 4px;
            background: var(--phoenix-orange);
            position: absolute;
            bottom: 0;
            animation: waveBar 0.6s infinite alternate;
        }
        
        @keyframes waveBar {
            0% { height: 20%; }
            100% { height: 80%; }
        }
        
        .connection-info {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="title">凤凰WebSocket实时通信</h1>
        <p>双向实时数据传输 - 音频流准备</p>
    </header>
    
    <div class="container">
        <!-- 控制面板 -->
        <div class="control-panel">
            <h2>连接控制</h2>
            
            <div class="status-indicator status-disconnected" id="ws-status">
                ● WebSocket断开
            </div>
            
            <button class="button" onclick="connectWebSocket()" id="connect-btn">
                🔗 连接WebSocket
            </button>
            
            <button class="button" onclick="disconnectWebSocket()" id="disconnect-btn" disabled>
                🔌 断开连接
            </button>
            
            <button class="button" onclick="testAudioStream()" id="audio-btn" disabled>
                🎤 测试音频流
            </button>
            
            <div class="audio-visualization" id="audio-viz">
                <!-- 动态波形条 -->
            </div>
            
            <div class="connection-info">
                <p><strong>连接信息:</strong></p>
                <p>ID: <span id="client-id">-</span></p>
                <p>状态: <span id="connection-state">未连接</span></p>
                <p>消息数: <span id="message-count">0</span></p>
            </div>
        </div>
        
        <!-- 通信面板 -->
        <div class="communication-panel">
            <h2>实时通信</h2>
            
            <div class="message-log" id="message-log">
                <div class="message system">
                    🔗 WebSocket实时通信系统准备就绪<br>
                    连接后可进行双向实时数据传输
                </div>
            </div>
            
            <div class="input-group">
                <input class="input-field" id="message-input" 
                       placeholder="输入消息进行实时通信..." 
                       onkeypress="handleKeyPress(event)"
                       disabled>
                <button class="button" id="send-btn" onclick="sendMessage()" disabled>发送</button>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = 'ws://localhost:3002';
        let ws = null;
        let clientId = null;
        let messageCount = 0;
        
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addMessage('system', 'WebSocket已连接');
                return;
            }
            
            updateStatus('connecting', '正在连接...');
            
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = () => {
                    updateStatus('connected', 'WebSocket已连接');
                    addMessage('system', '✅ WebSocket连接成功');
                    enableControls(true);
                    
                    // 创建音频可视化
                    createAudioVisualization();
                };
                
                ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    messageCount++;
                    updateMessageCount();
                    
                    handleIncomingMessage(message);
                };
                
                ws.onclose = () => {
                    updateStatus('disconnected', 'WebSocket断开');
                    addMessage('system', '🔌 WebSocket连接已断开');
                    enableControls(false);
                };
                
                ws.onerror = (error) => {
                    updateStatus('disconnected', '连接错误');
                    addMessage('system', '❌ WebSocket连接错误');
                    console.error('WebSocket错误:', error);
                };
                
            } catch (error) {
                updateStatus('disconnected', '连接失败');
                addMessage('system', '❌ 连接失败: ' + error.message);
            }
        }
        
        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }
        
        function handleIncomingMessage(message) {
            switch (message.type) {
                case 'system':
                    clientId = message.clientId;
                    document.getElementById('client-id').textContent = clientId;
                    addMessage('system', message.message);
                    break;
                
                case 'text_response':
                    addMessage('bot', message.text);
                    break;
                
                case 'audio_response':
                    addMessage('bot', `🎯 ${message.text} (置信度: ${Math.round(message.confidence * 100)}%)`);
                    break;
                
                case 'system_update':
                    addMessage('system', `📊 ${message.message} - ${message.clientCount}客户端在线`);
                    break;
                
                case 'pong':
                    const latency = Date.now() - message.timestamp;
                    addMessage('system', `🏓 Pong - 延迟: ${latency}ms`);
                    break;
                
                default:
                    console.log('未知消息类型:', message);
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            const message = {
                type: 'text_message',
                text: text,
                timestamp: Date.now()
            };
            
            ws.send(JSON.stringify(message));
            addMessage('user', text);
            input.value = '';
        }
        
        function testAudioStream() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            
            addMessage('system', '🎤 开始模拟音频流测试...');
            
            // 模拟音频数据发送
            let chunksSent = 0;
            const audioTest = setInterval(() => {
                if (chunksSent >= 5) {
                    clearInterval(audioTest);
                    addMessage('system', '✅ 音频流测试完成');
                    return;
                }
                
                const audioMessage = {
                    type: 'audio_chunk',
                    chunk: `audio_chunk_${chunksSent}`,
                    timestamp: Date.now(),
                    sequence: chunksSent
                };
                
                ws.send(JSON.stringify(audioMessage));
                chunksSent++;
                
                // 更新音频可视化
                updateAudioVisualization();
            }, 500);
        }
        
        function createAudioVisualization() {
            const viz = document.getElementById('audio-viz');
            viz.style.display = 'block';
            viz.innerHTML = '';
            
            for (let i = 0; i < 30; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                bar.style.left = (i * 14) + 'px';
                bar.style.animationDelay = (i * 0.05) + 's';
                viz.appendChild(bar);
            }
        }
        
        function updateAudioVisualization() {
            // 随机更新一些波形条的高度
            const bars = document.querySelectorAll('.wave-bar');
            bars.forEach(bar => {
                if (Math.random() > 0.7) {
                    bar.style.height = Math.random() * 60 + 20 + '%';
                }
            });
        }
        
        function updateStatus(status, message) {
            const statusEl = document.getElementById('ws-status');
            statusEl.className = `status-indicator status-${status}`;
            statusEl.innerHTML = `● ${message}`;
            
            document.getElementById('connection-state').textContent = message;
        }
        
        function updateMessageCount() {
            document.getElementById('message-count').textContent = messageCount;
        }
        
        function enableControls(enabled) {
            document.getElementById('connect-btn').disabled = enabled;
            document.getElementById('disconnect-btn').disabled = !enabled;
            document.getElementById('audio-btn').disabled = !enabled;
            document.getElementById('message-input').disabled = !enabled;
            document.getElementById('send-btn').disabled = !enabled;
        }
        
        function addMessage(sender, content) {
            const logDiv = document.getElementById('message-log');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let prefix = '';
            if (sender === 'user') prefix = '你';
            else if (sender === 'bot') prefix = '凤凰AI';
            
            messageDiv.innerHTML = `<strong>${prefix}:</strong> ${content}`;
            
            logDiv.appendChild(messageDiv);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            // 自动连接
            setTimeout(() => {
                connectWebSocket();
            }, 1000);
        });
    </script>
</body>
</html>
