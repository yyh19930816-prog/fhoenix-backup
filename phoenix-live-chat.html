<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凤凰实时对话 - 服务集成演示</title>
    <style>
        :root {
            --phoenix-red: #f43f5e;
            --phoenix-orange: #fb923c;
            --phoenix-gold: #fbbf24;
            --phoenix-bg-dark: #0f1419;
            --phoenix-bg-light: #1e293b;
            --phoenix-text: #e2e8f0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, var(--phoenix-bg-dark), var(--phoenix-bg-light));
            color: var(--phoenix-text);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--phoenix-red);
            text-align: center;
        }
        
        .title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--phoenix-red), var(--phoenix-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            opacity: 0.8;
            font-size: 1.1rem;
        }
        
        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            gap: 2rem;
        }
        
        .status-panel {
            flex: 1;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }
        
        .chat-panel {
            flex: 2;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid rgba(244, 63, 94, 0.3);
            display: flex;
            flex-direction: column;
        }
        
        .status-item {
            margin-bottom: 1.5rem;
        }
        
        .status-title {
            font-size: 1.2rem;
            color: var(--phoenix-gold);
            margin-bottom: 0.5rem;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        
        .status-online {
            background: rgba(16,185,129,0.15);
            color: #86efac;
            border: 1px solid rgba(16,185,129,0.3);
        }
        
        .status-offline {
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(15,20,25,0.5);
            border-radius: 8px;
            margin-bottom: 1rem;
            min-height: 400px;
        }
        
        .message {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: rgba(59,130,246,0.2);
            margin-left: auto;
            border: 1px solid rgba(59,130,246,0.3);
        }
        
        .message.bot {
            background: rgba(16,185,129,0.2);
            margin-right: auto;
            border: 1px solid rgba(16,185,129,0.3);
        }
        
        .message.system {
            background: rgba(251,191,36,0.2);
            margin: 0 auto;
            border: 1px solid rgba(251,191,36,0.3);
            max-width: 90%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .chat-input {
            display: flex;
            gap: 1rem;
        }
        
        .input-field {
            flex: 1;
            padding: 0.75rem;
            background: rgba(15,20,25,0.8);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--phoenix-text);
            font-size: 1rem;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--phoenix-orange);
        }
        
        .send-button {
            background: linear-gradient(135deg, var(--phoenix-red), var(--phoenix-orange));
            border: none;
            color: white;
            padding: 0 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.3);
        }
        
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            color: var(--phoenix-gold);
            font-style: italic;
        }
        
        .typing-dots {
            display: flex;
            gap: 2px;
        }
        
        .typing-dots span {
            width: 4px;
            height: 4px;
            background: var(--phoenix-gold);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .quick-button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--phoenix-text);
            padding: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .quick-button:hover {
            background: rgba(244,63,94,0.2);
            border-color: var(--phoenix-orange);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="title">凤凰实时对话</h1>
        <p class="subtitle">前端界面直接连接凤凰AI - 服务集成演示</p>
    </header>
    
    <div class="container">
        <!-- 状态面板 -->
        <div class="status-panel">
            <div class="status-item">
                <h3 class="status-title">服务状态</h3>
                <div class="status-indicator status-online" id="server-status">
                    ● 后端服务在线
                </div>
                <p style="margin-top: 0.5rem; font-size: 0.9rem;">端口: 3000</p>
            </div>
            
            <div class="status-item">
                <h3 class="status-title">连接测试</h3>
                <div id="connection-test">
                    <p>API端点: /chat, /status, /modules</p>
                    <p>会话管理: 多用户支持</p>
                    <p>响应延迟: &lt;1秒</p>
                </div>
            </div>
            
            <div class="status-item">
                <h3 class="status-title">快速操作</h3>
                <div class="quick-actions">
                    <button class="quick-button" onclick="sendQuickMessage('你在吗')">测试连接</button>
                    <button class="quick-button" onclick="sendQuickMessage('凤凰计划')">项目状态</button>
                    <button class="quick-button" onclick="sendQuickMessage('现在几点')">当前时间</button>
                    <button class="quick-button" onclick="sendQuickMessage('你是谁')">自我介绍</button>
                </div>
            </div>
        </div>
        
        <!-- 聊天面板 -->
        <div class="chat-panel">
            <div class="chat-messages" id="chat-messages">
                <div class="message system">
                    🚀 凤凰实时对话系统已启动<br>
                    你现在可以直接在这个界面与我对话，不需要打开其他窗口
                </div>
            </div>
            
            <div class="chat-input">
                <input class="input-field" id="message-input" 
                       placeholder="输入消息与凤凰AI对话..." 
                       onkeypress="handleKeyPress(event)">
                <button class="send-button" id="send-button" onclick="sendMessage()">发送</button>
            </div>
            
            <div class="typing-indicator" id="typing-indicator">
                <span>凤凰AI正在思考</span>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        let sessionId = 'user_' + Date.now();
        
        // 检查后端服务状态
        async function checkServerStatus() {
            try {
                const response = await fetch(API_BASE + '/status');
                const data = await response.json();
                
                const statusEl = document.getElementById('server-status');
                statusEl.className = 'status-indicator status-online';
                statusEl.innerHTML = `● 后端服务在线 (v${data.version})`;
                
                return true;
            } catch (error) {
                const statusEl = document.getElementById('server-status');
                statusEl.className = 'status-indicator status-offline';
                statusEl.innerHTML = '● 后端服务离线';
                
                addMessage('system', '❌ 无法连接到后端服务，请确保服务器正在运行');
                return false;
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 禁用输入和发送按钮
            input.disabled = true;
            document.getElementById('send-button').disabled = true;
            
            // 显示用户消息
            addMessage('user', message);
            input.value = '';
            
            // 显示正在输入指示器
            showTypingIndicator();
            
            try {
                const response = await fetch(API_BASE + '/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        sessionId: sessionId
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addMessage('bot', data.response);
                } else {
                    addMessage('system', `错误: ${data.error}`);
                }
                
            } catch (error) {
                addMessage('system', '❌ 发送消息失败，请检查网络连接');
                console.error('发送消息错误:', error);
            } finally {
                // 隐藏输入指示器
                hideTypingIndicator();
                
                // 重新启用输入
                input.disabled = false;
                document.getElementById('send-button').disabled = false;
                input.focus();
            }
        }
        
        // 快速发送消息
        function sendQuickMessage(message) {
            const input = document.getElementById('message-input');
            input.value = message;
            sendMessage();
        }
        
        // 显示正在输入指示器
        function showTypingIndicator() {
            document.getElementById('typing-indicator').style.display = 'flex';
        }
        
        // 隐藏正在输入指示器
        function hideTypingIndicator() {
            document.getElementById('typing-indicator').style.display = 'none';
        }
        
        // 添加消息到聊天框
        function addMessage(sender, content) {
            const messagesDiv = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let prefix = '';
            if (sender === 'user') prefix = '你';
            else if (sender === 'bot') prefix = '凤凰AI';
            
            messageDiv.innerHTML = `<strong>${prefix}:</strong> ${content}`;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // 处理键盘事件
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 页面加载初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 自动检查服务状态
            checkServerStatus();
            
            // 聚焦输入框
            document.getElementById('message-input').focus();
            
            // 添加欢迎消息
            setTimeout(() => {
                addMessage('bot', '你好！我是凤凰AI，现在我们可以在这个界面直接对话了。你可以问我关于凤凰计划的任何问题。');
            }, 1000);
        });
    </script>
</body>
</html>
